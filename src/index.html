<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SMA Signals</title>
  <style>
    /* ── Tokens ── */
    :root {
      --bg:         #FFFFFF;
      --bg-subtle:  #FAFAFA;
      --surface:    #FFFFFF;
      --border:     #E5E5E5;
      --border-mid: #D4D4D4;

      --text:       #111111;
      --text-2:     #404040;
      --text-3:     #737373;
      --text-muted: #A3A3A3;

      --accent:     #000000;
      --accent-fg:  #FFFFFF;

      --buy:        #16A34A;
      --buy-bg:     #F0FDF4;
      --sell:       #DC2626;
      --sell-bg:    #FFF1F2;
      --hold:       #737373;
      --hold-bg:    #F5F5F5;

      --radius:     12px;
      --radius-sm:  8px;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      padding-top: env(safe-area-inset-top);
      overscroll-behavior: none;
    }

    .page {
      max-width: 480px;
      margin: 0 auto;
      /* bottom pad = refresh-bar height (~73px) + safe area */
      padding: 20px 16px calc(73px + env(safe-area-inset-bottom));
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .header-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.8px;
      line-height: 1.1;
      color: var(--text);
    }

    .header-sub {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-3);
      margin-top: 3px;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 2px;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid var(--border-mid);
      border-radius: 50%;
      background: var(--surface);
      cursor: pointer;
      color: var(--text-3);
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.15s, color 0.15s;
    }
    .icon-btn:active { border-color: var(--text); color: var(--text); }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 34px;
      padding: 0 14px;
      border-radius: 34px;
      border: 1.5px solid var(--border-mid);
      background: var(--surface);
      color: var(--text-3);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: -0.1px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .filter-chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--accent-fg);
    }

    .chip-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .chip-dot.buy  { background: var(--buy); }
    .chip-dot.hold { background: var(--hold); }
    .chip-dot.sell { background: var(--sell); }
    .filter-chip.active .chip-dot { display: none; }

    /* ── Cards ── */
    /* Outer card is the clip container; inner card is what slides */
    .index-card {
      position: relative;
      overflow: hidden;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
    }

    /* Swipe-reveal action strip (sits behind card-inner on the right) */
    .swipe-actions {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: stretch;
    }

    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      width: 80px;
      border: none;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      color: white;
      -webkit-tap-highlight-color: transparent;
    }

    .action-notif  { background: #3A3A3A; }
    .action-delete { background: var(--sell); }

    .notif-bell {
      color: var(--text-muted);
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    /* The sliding face of the card */
    .card-inner {
      background: var(--surface);
      position: relative;
      z-index: 1;
      border-radius: calc(var(--radius) - 2px);
      transform: translateX(0);
      will-change: transform;
    }

    .card-main {
      display: flex;
      align-items: center;
      padding: 16px;
      gap: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .card-info { flex: 1; min-width: 0; }

    .card-name {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
    }
    .card-symbol {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-3);
      margin-top: 2px;
    }

    .card-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
      flex-shrink: 0;
    }

    .signal-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .signal-badge.buy      { background: var(--buy-bg);  color: var(--buy); }
    .signal-badge.hold     { background: var(--hold-bg); color: var(--hold); }
    .signal-badge.sell,
    .signal-badge.sell-80,
    .signal-badge.sell-all { background: var(--sell-bg); color: var(--sell); }

    .card-pct {
      font-size: 13px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--text-3);
    }
    .card-pct.up   { color: var(--buy); }
    .card-pct.down { color: var(--sell); }

    .card-chevron {
      color: var(--text-muted);
      flex-shrink: 0;
      transition: transform 0.2s ease;
    }
    .card-chevron.open { transform: rotate(180deg); }

    /* Loading */
    .card-loading {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border-mid);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .card-loading-text { font-size: 13px; color: var(--text-muted); }

    /* Error */
    .card-error {
      margin-left: auto;
      text-align: right;
      font-size: 13px;
      color: var(--sell);
      line-height: 1.5;
    }

    /* Expand */
    .card-detail {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.22s ease;
    }
    .card-detail.open { max-height: 300px; }

    /* Toggle — used both in settings and on cards */
    .toggle {
      position: relative;
      width: 46px;
      height: 26px;
      border-radius: 13px;
      background: var(--border-mid);
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.18s;
    }
    .toggle.on { background: var(--accent); }
    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.18);
      transition: transform 0.18s;
    }
    .toggle.on .toggle-thumb { transform: translateX(20px); }

    .detail-inner {
      border-top: 1.5px solid var(--border);
      margin: 0 16px;
      padding: 8px 0;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
    }
    .detail-row + .detail-row { border-top: 1px solid var(--border); }
    .detail-label { font-size: 14px; font-weight: 400; color: var(--text-3); }
    .detail-value { font-size: 14px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }

    .detail-actions {
      display: flex;
      border-top: 1.5px solid var(--border);
      margin: 0 16px;
    }
    .detail-action-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 0;
      background: none;
      border: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-3);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .detail-action-remove {
      border-left: 1px solid var(--border);
      color: var(--sell);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-3);
      font-size: 15px;
      line-height: 1.7;
    }

    /* ── Sticky Refresh bar ── */
    .refresh-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      z-index: 50;
    }

    .refresh-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: var(--accent-fg);
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }
    .refresh-btn:active   { opacity: 0.8; }
    .refresh-btn:disabled { opacity: 0.4; cursor: default; }

    .last-updated {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
      margin-bottom: 8px;
      min-height: 16px;
    }

    /* ── Bottom sheet shared styles ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
      backdrop-filter: blur(1px);
      -webkit-backdrop-filter: blur(1px);
      align-items: flex-end;
    }
    .overlay.open    { display: flex; animation: overlayIn  0.22s ease forwards; }
    .overlay.closing { display: flex; animation: overlayOut 0.22s ease forwards; }
    @keyframes overlayIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes overlayOut { from { opacity: 1; } to { opacity: 0; } }

    .sheet {
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: env(safe-area-inset-bottom);
      max-height: 88vh;
      overflow-y: auto;
      animation: slideUp 0.25s cubic-bezier(0.32, 0.72, 0, 1);
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    @keyframes slideDown {
      from { transform: translateY(0); }
      to   { transform: translateY(100%); }
    }
    .sheet.closing {
      animation: slideDown 0.22s cubic-bezier(0.32, 0.72, 0, 1) forwards;
    }

    /* Swipe close spring — bounces within the negative range, no overflow tricks needed */
    @keyframes springClose {
      0%   { transform: translateX(-160px); }
      55%  { transform: translateX(-8px);   }
      70%  { transform: translateX(-22px);  }
      85%  { transform: translateX(-4px);   }
      100% { transform: translateX(0);      }
    }
    .card-inner.spring-closing {
      animation: springClose 0.42s ease-in-out forwards;
      transition: none !important;
    }

    .sheet-handle {
      width: 32px;
      height: 4px;
      border-radius: 2px;
      background: var(--border-mid);
      margin: 12px auto 0;
    }

    .sheet-header {
      padding: 16px 20px 12px;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .sheet-section {
      padding: 0 20px;
      margin-bottom: 24px;
    }

    .sheet-section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .sheet-rows {
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }

    .sheet-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 13px 14px;
      background: var(--bg-subtle);
      border-bottom: 1px solid var(--border);
    }
    .sheet-row:last-child { border-bottom: none; }

    .sheet-row-label { font-size: 15px; font-weight: 500; color: var(--text); }
    .sheet-row-hint  { font-size: 12px; font-weight: 400; color: var(--text-3); margin-top: 1px; }

    /* Inputs */
    .sheet-input {
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      background: var(--surface);
      border: 1.5px solid var(--border-mid);
      border-radius: 8px;
      padding: 6px 10px;
      width: 72px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .sheet-input:focus { outline: none; border-color: var(--accent); }

    .sheet-select {
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      background: var(--surface);
      border: 1.5px solid var(--border-mid);
      border-radius: 8px;
      padding: 6px 10px;
      max-width: 150px;
    }
    .sheet-select:focus { outline: none; border-color: var(--accent); }

    .time-input {
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      background: var(--bg-subtle);
      border: 1.5px solid var(--border-mid);
      border-radius: 8px;
      cursor: pointer;
      padding: 6px 10px;
    }

    .notif-time-row {
      overflow: hidden;
      max-height: 60px;
      transition: max-height 0.2s ease, opacity 0.2s ease;
    }
    .notif-time-row.hidden { max-height: 0; opacity: 0; pointer-events: none; }

    /* Done button */
    .sheet-done {
      display: block;
      width: calc(100% - 40px);
      margin: 4px 20px 20px;
      padding: 14px;
      background: var(--accent);
      color: var(--accent-fg);
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: -0.2px;
      transition: opacity 0.15s;
    }
    .sheet-done:active { opacity: 0.8; }

    /* ── Add Index sheet specifics ── */
    .add-index-row {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
    }
    .add-index-row:active { background: var(--border); }

    .add-index-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1.5px solid var(--border-mid);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-3);
      flex-shrink: 0;
    }

    .add-empty {
      text-align: center;
      padding: 32px 20px;
      color: var(--text-3);
      font-size: 14px;
      line-height: 1.6;
    }

    /* Reduce motion */
    @media (prefers-reduced-motion: reduce) {
      .card-detail, .card-chevron, .filter-chip,
      .sheet { transition: none; animation: none; }
    }
  </style>
</head>
<body>

<div class="page">

  <!-- Header -->
  <div class="header">
    <div>
      <div class="header-title">SMA Signals</div>
      <div class="header-sub">200-day moving average</div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="openAddIndex()" aria-label="Add index">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
      <button class="icon-btn" onclick="openSettings()" aria-label="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar" role="group" aria-label="Filter signals">
    <button class="filter-chip active" id="filterAll"  onclick="setFilter(null)">All</button>
    <button class="filter-chip"        id="filterBuy"  onclick="setFilter('buy')">
      <span class="chip-dot buy"></span><span id="buyCount">–</span> BUY
    </button>
    <button class="filter-chip"        id="filterHold" onclick="setFilter('hold')">
      <span class="chip-dot hold"></span><span id="holdCount">–</span> HOLD
    </button>
    <button class="filter-chip"        id="filterSell" onclick="setFilter('sell')">
      <span class="chip-dot sell"></span><span id="sellCount">–</span> SELL
    </button>
  </div>

  <!-- Cards -->
  <div id="cardsContainer"></div>

</div>

<!-- Sticky refresh bar -->
<div class="refresh-bar">
  <div class="last-updated" id="lastUpdated"></div>
  <button class="refresh-btn" id="refreshBtn" onclick="fetchAll()">Refresh All</button>
</div>

<!-- Settings overlay -->
<div class="overlay" id="settingsOverlay" onclick="settingsOverlayClick(event)">
  <div class="sheet" id="settingsSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">Settings</div>

    <div class="sheet-section">
      <div class="sheet-section-label">Signal Thresholds</div>
      <div class="sheet-rows">
        <div class="sheet-row">
          <div>
            <div class="sheet-row-label">Buy above SMA</div>
            <div class="sheet-row-hint">% above 200-day average</div>
          </div>
          <input class="sheet-input" type="number" id="buyThreshold" value="4" step="0.1" min="0" max="100">
        </div>
        <div class="sheet-row">
          <div>
            <div class="sheet-row-label">Sell below SMA</div>
            <div class="sheet-row-hint">% below 200-day average</div>
          </div>
          <input class="sheet-input" type="number" id="sellThreshold" value="3" step="0.1" min="0" max="100">
        </div>
      </div>
    </div>

    <div class="sheet-section">
      <div class="sheet-section-label">Notifications</div>
      <div class="sheet-rows">
        <div class="sheet-row">
          <div class="sheet-row-label">Frequency</div>
          <select class="sheet-select" id="notifFrequency" onchange="onNotifFreqChange()">
            <option value="disabled">Off</option>
            <option value="on_change" selected>On change</option>
            <option value="daily">Daily</option>
          </select>
        </div>
        <div class="sheet-row notif-time-row" id="notifTimeRow">
          <div>
            <div class="sheet-row-label">Alert time</div>
            <div class="sheet-row-hint" id="tzHint">Your timezone</div>
          </div>
          <input type="time" id="notifTime" class="time-input">
        </div>
      </div>
    </div>

    <button class="sheet-done" onclick="closeSettings()">Done</button>
  </div>
</div>

<!-- Add Index overlay -->
<div class="overlay" id="addOverlay" onclick="addOverlayClick(event)">
  <div class="sheet" id="addSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">Add Index</div>

    <div class="sheet-section">
      <div class="sheet-section-label">Available</div>
      <div id="addIndexList" class="sheet-rows"></div>
    </div>

    <button class="sheet-done" onclick="closeAddIndex()">Done</button>
  </div>
</div>

<script>
  const CATALOG = [
    { id: '$SPX',  name: 'S&P 500',           symbol: '$SPX'  },
    { id: '$NASX', name: 'NASDAQ Composite',   symbol: '$NASX' },
    { id: '$DJI',  name: 'Dow Jones',          symbol: '$DJI'  },
    { id: 'URTH',  name: 'MSCI World',         symbol: 'URTH'  },
    { id: 'QQQ',   name: 'NASDAQ 100',         symbol: 'QQQ'   },
    { id: 'IWM',   name: 'Russell 2000',       symbol: 'IWM'   },
    { id: 'EEM',   name: 'Emerging Markets',   symbol: 'EEM'   },
    { id: 'GLD',   name: 'Gold',               symbol: 'GLD'   },
    { id: 'VEA',   name: 'Developed Markets',  symbol: 'VEA'   },
  ];

  const MOCK = {
    '$SPX':  { currentPrice: 5320.45,  sma200: 4987.12  },
    '$NASX': { currentPrice: 19250.00, sma200: 19100.00 },
    '$DJI':  { currentPrice: 43800.00, sma200: 42500.00 },
    'URTH':  { currentPrice: 113.20,   sma200: 120.50   },
    'QQQ':   { currentPrice: 478.50,   sma200: 455.00   },
    'IWM':   { currentPrice: 198.20,   sma200: 205.00   },
    'EEM':   { currentPrice: 44.50,    sma200: 43.80    },
    'GLD':   { currentPrice: 310.00,   sma200: 285.00   },
    'VEA':   { currentPrice: 49.80,    sma200: 51.20    },
  };

  let tracked      = ['$SPX', '$NASX', 'URTH'];
  let results      = {};
  let activeFilter = null;
  let activeSwipe  = null;
  let notifEnabled = {}; // sym → boolean

  // ── Swipe to reveal ───────────────────────────────────────────
  function attachSwipe(sym) {
    const card = document.querySelector(`.index-card[data-sym="${sym}"]`);
    if (!card) return;
    const inner       = card.querySelector('.card-inner');
    const actionWidth = 160; // two action buttons at 80px each

    let startX = 0, startY = 0, curX = 0, direction = null;

    inner.addEventListener('touchstart', e => {
      startX    = e.touches[0].clientX;
      startY    = e.touches[0].clientY;
      curX      = startX;
      direction = null;
      inner.style.transition = 'none';
      if (activeSwipe && activeSwipe !== sym) closeSwipe(activeSwipe);
    }, { passive: true });

    inner.addEventListener('touchmove', e => {
      curX = e.touches[0].clientX;
      const dx = curX - startX;
      const dy = e.touches[0].clientY - startY;

      if (!direction && (Math.abs(dx) > 5 || Math.abs(dy) > 5)) {
        direction = Math.abs(dx) >= Math.abs(dy) ? 'h' : 'v';
      }
      if (direction !== 'h') return;

      e.preventDefault();
      const translate = Math.min(0, Math.max(-actionWidth, dx));
      inner.style.transform = `translateX(${translate}px)`;
    }, { passive: false });

    inner.addEventListener('touchend', () => {
      if (direction !== 'h') return;
      inner.style.transition = 'transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
      const dx = curX - startX;
      if (dx < -(actionWidth / 2)) {
        inner.style.transform = `translateX(-${actionWidth}px)`;
        activeSwipe = sym;
      } else {
        inner.style.transform = 'translateX(0)';
        if (activeSwipe === sym) activeSwipe = null;
      }
    });
  }

  function closeSwipe(sym) {
    const inner = document.querySelector(`.index-card[data-sym="${sym}"] .card-inner`);
    if (inner) {
      inner.style.transition = '';
      inner.classList.add('spring-closing');
      inner.addEventListener('animationend', () => {
        inner.classList.remove('spring-closing');
        inner.style.transform = 'translateX(0)';
      }, { once: true });
    }
    if (activeSwipe === sym) activeSwipe = null;
  }

  // Close any open swipe when tapping outside that card
  document.addEventListener('touchstart', e => {
    if (activeSwipe && !e.target.closest(`.index-card[data-sym="${activeSwipe}"]`)) {
      closeSwipe(activeSwipe);
    }
  }, { passive: true });

  // ── Delete index ──────────────────────────────────────────────
  function deleteIndex(sym, e) {
    e.stopPropagation();
    const inner = document.querySelector(`.index-card[data-sym="${sym}"] .card-inner`);
    if (inner) {
      inner.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
      inner.style.transform  = 'translateX(-110%)';
      inner.style.opacity    = '0';
    }
    setTimeout(() => {
      tracked = tracked.filter(s => s !== sym);
      delete results[sym];
      if (activeSwipe === sym) activeSwipe = null;
      saveSettings();
      renderCards();
    }, 200);
  }

  // ── Settings ──────────────────────────────────────────────────
  function loadSettings() {
    const t    = localStorage.getItem('trackedIndexes');
    const buy  = localStorage.getItem('buyThreshold');
    const sell = localStorage.getItem('sellThreshold');
    const freq = localStorage.getItem('notifFrequency');
    const hour = localStorage.getItem('notifHour');
    const min  = localStorage.getItem('notifMinute');

    const n = localStorage.getItem('notifEnabled');
    if (n)    notifEnabled = JSON.parse(n);
    if (t)    tracked = JSON.parse(t);
    if (buy)  document.getElementById('buyThreshold').value  = buy;
    if (sell) document.getElementById('sellThreshold').value = sell;

    const oldEnabled = localStorage.getItem('notifEnabled');
    if (freq)                        document.getElementById('notifFrequency').value = freq;
    else if (oldEnabled === 'false') document.getElementById('notifFrequency').value = 'disabled';

    document.getElementById('notifTime').value =
      (hour && min)
        ? `${String(hour).padStart(2,'0')}:${String(min).padStart(2,'0')}`
        : defaultNotifTime();

    updateNotifTimeVisibility();
  }

  function saveSettings() {
    localStorage.setItem('notifEnabled',   JSON.stringify(notifEnabled));
    localStorage.setItem('trackedIndexes', JSON.stringify(tracked));
    localStorage.setItem('buyThreshold',   document.getElementById('buyThreshold').value);
    localStorage.setItem('sellThreshold',  document.getElementById('sellThreshold').value);
    localStorage.setItem('notifFrequency', document.getElementById('notifFrequency').value);
    const [h, m] = (document.getElementById('notifTime').value || '15:30').split(':');
    localStorage.setItem('notifHour',   String(parseInt(h  || '15', 10)));
    localStorage.setItem('notifMinute', String(parseInt(m  || '30', 10)));
    if (window.Android && typeof window.Android.rescheduleNotifications === 'function') {
      try { window.Android.rescheduleNotifications(); } catch (_) {}
    }
  }

  function defaultNotifTime() {
    const now = new Date(), mo = now.getMonth();
    const off = (mo >= 2 && mo <= 10) ? 4 : 5;
    const yyyy = now.getFullYear();
    const mm   = String(now.getMonth() + 1).padStart(2, '0');
    const dd   = String(now.getDate()).padStart(2, '0');
    const t    = new Date(`${yyyy}-${mm}-${dd}T15:30:00-0${off}:00`);
    return `${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
  }

  function toggleNotif(sym, e) {
    e.stopPropagation();
    notifEnabled[sym] = !notifEnabled[sym];
    localStorage.setItem('notifEnabled', JSON.stringify(notifEnabled));
    // Update swipe action button in-place
    const actionEl = document.getElementById(`notif-action-${sym}`);
    if (actionEl) {
      actionEl.innerHTML = bellIcon(18, notifEnabled[sym]) +
        `<span>${notifEnabled[sym] ? 'Notify On' : 'Notify Off'}</span>`;
    }
    // Update bell indicator in card header in-place
    const bellEl = document.getElementById(`bell-${sym}`);
    if (bellEl) bellEl.innerHTML = bellIcon(15, notifEnabled[sym]);
    // Update notify button in expanded detail in-place
    const detailBtnEl = document.getElementById(`notif-detail-btn-${sym}`);
    if (detailBtnEl) {
      detailBtnEl.innerHTML = bellIcon(14, notifEnabled[sym]) +
        `<span>${notifEnabled[sym] ? 'Notify On' : 'Notify Off'}</span>`;
    }
    if (window.Android && typeof window.Android.rescheduleNotifications === 'function') {
      try { window.Android.rescheduleNotifications(); } catch (_) {}
    }
  }

  function openSettings() {
    document.getElementById('settingsOverlay').classList.add('open');
    try {
      const abbr = new Date().toLocaleTimeString('en-US', { timeZoneName: 'short' })
        .match(/[A-Z]{3,5}/)?.[0]
        || Intl.DateTimeFormat().resolvedOptions().timeZone.split('/').pop().replace(/_/g, ' ');
      const el = document.getElementById('tzHint');
      if (el) el.textContent = abbr;
    } catch (_) {}
  }
  function closeSettings() {
    saveSettings();
    const overlay = document.getElementById('settingsOverlay');
    const sheet   = document.getElementById('settingsSheet');
    sheet.classList.add('closing');
    overlay.classList.add('closing');
    overlay.classList.remove('open');
    setTimeout(() => {
      overlay.classList.remove('closing');
      sheet.classList.remove('closing');
      sheet.style.transform = '';
      sheet.style.transition = '';
      renderCards();
      tracked.filter(s => !results[s] || results[s].state === 'error').forEach(fetchOne);
    }, 220);
  }
  function settingsOverlayClick(e) {
    if (e.target === document.getElementById('settingsOverlay')) closeSettings();
  }
  function onNotifFreqChange() { updateNotifTimeVisibility(); }
  function updateNotifTimeVisibility() {
    const freq = document.getElementById('notifFrequency').value;
    document.getElementById('notifTimeRow').classList.toggle('hidden', freq === 'disabled');
  }

  // ── Add Index sheet ───────────────────────────────────────────
  function openAddIndex() {
    const available = CATALOG.filter(c => !tracked.includes(c.id));
    const listEl    = document.getElementById('addIndexList');

    if (!available.length) {
      listEl.innerHTML = '<div class="add-empty">All available indexes are already being tracked.</div>';
    } else {
      listEl.innerHTML = available.map(idx => `
        <div class="sheet-row add-index-row" onclick="addIndex('${idx.id}')">

  function addIndex(id) {
    if (!tracked.includes(id)) {
      tracked.push(id);
      saveSettings();
    }
    closeAddIndex();
    renderCards();
    fetchOne(id);
  }

  function closeAddIndex() {
    const overlay = document.getElementById('addOverlay');
    const sheet   = document.getElementById('addSheet');
    sheet.classList.add('closing');
    overlay.classList.add('closing');
    overlay.classList.remove('open');
    setTimeout(() => {
      overlay.classList.remove('closing');
      sheet.classList.remove('closing');
      sheet.style.transform = '';
      sheet.style.transition = '';
    }, 220);
  }
  function addOverlayClick(e) {
    if (e.target === document.getElementById('addOverlay')) closeAddIndex();
  }

  // ── Signal logic ──────────────────────────────────────────────
  function determineSignal(price, sma, buyT, sellT) {
    const pct = ((price - sma) / sma) * 100;
    if (pct >= 40)     return { signal: 'SELL ALL', cls: 'sell-all', pct };
    if (pct >= 30)     return { signal: 'SELL 80%', cls: 'sell-80',  pct };
    if (pct >= buyT)   return { signal: 'BUY',      cls: 'buy',      pct };
    if (pct <= -sellT) return { signal: 'SELL',     cls: 'sell',     pct };
    return                    { signal: 'HOLD',     cls: 'hold',     pct };
  }

  function filterGroup(cls) {
    return cls === 'buy' ? 'buy' : cls === 'hold' ? 'hold' : 'sell';
  }

  // ── Filter ────────────────────────────────────────────────────
  function setFilter(type) {
    activeFilter = (activeFilter === type) ? null : type;
    updateFilterBar();
    applyFilter();
  }

  function updateFilterBar() {
    const counts = { buy: 0, hold: 0, sell: 0 };
    tracked.forEach(sym => {
      const r = results[sym];
      if (r && r.state === 'done') counts[filterGroup(r.cls)]++;
    });
    document.getElementById('buyCount').textContent  = counts.buy;
    document.getElementById('holdCount').textContent = counts.hold;
    document.getElementById('sellCount').textContent = counts.sell;

    ['filterAll','filterBuy','filterHold','filterSell'].forEach(id =>
      document.getElementById(id).classList.remove('active'));
    const activeId = !activeFilter        ? 'filterAll'  :
                     activeFilter==='buy'  ? 'filterBuy'  :
                     activeFilter==='hold' ? 'filterHold' : 'filterSell';
    document.getElementById(activeId).classList.add('active');
  }

  function applyFilter() {
    document.querySelectorAll('.index-card').forEach(card => {
      const r    = results[card.dataset.sym];
      const show = !activeFilter || (r && r.state === 'done' && filterGroup(r.cls) === activeFilter);
      card.style.display = show ? '' : 'none';
    });
  }

  // ── Card HTML ─────────────────────────────────────────────────
  const CHEV  = `<svg class="card-chevron" id="chev-SYM" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`;
  const TRASH = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;

  function bellIcon(size, on) {
    if (on) return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>`;
    return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/><line x1="2" y1="2" x2="22" y2="22"/></svg>`;
  }

  function cardHTML(sym) {
    const idx = CATALOG.find(c => c.id === sym);
    if (!idx) return '';
    const r    = results[sym] || { state: 'loading' };
    const chev = CHEV.replace('id="chev-SYM"', `id="chev-${sym}"`);

    const swipeActions = `
      <div class="swipe-actions">
        <button class="action-btn action-notif" id="notif-action-${sym}" onclick="toggleNotif('${sym}', event)">
          ${bellIcon(18, notifEnabled[sym])}
          <span>${notifEnabled[sym] ? 'Notify On' : 'Notify Off'}</span>
        </button>
        <button class="action-btn action-delete" onclick="deleteIndex('${sym}', event)">
          ${TRASH}
          <span>Delete</span>
        </button>
      </div>`;

    if (r.state === 'loading') return `
      <div class="index-card" data-sym="${sym}">
        ${swipeActions}
        <div class="card-inner">
          <div class="card-main">
            <div class="card-info">
              <div class="card-name">${idx.name}</div>
              <div class="card-symbol">${idx.symbol}</div>
            </div>
            <div class="card-loading">
              <div class="spinner"></div>
              <span class="card-loading-text">Loading…</span>
            </div>
          </div>
        </div>
      </div>`;

    if (r.state === 'error') return `
      <div class="index-card" data-sym="${sym}">
        ${swipeActions}
        <div class="card-inner" onclick="retryOne('${sym}')">
          <div class="card-main">
            <div class="card-info">
              <div class="card-name">${idx.name}</div>
              <div class="card-symbol">${idx.symbol}</div>
            </div>
            <div class="card-error">Failed to load<br><small style="opacity:.7">Tap to retry</small></div>
          </div>
        </div>
      </div>`;

    const sign    = r.pct >= 0 ? '+' : '';
    const pctCls  = r.pct >= 0 ? 'up' : 'down';
    const distCol = r.pct >= 0 ? 'var(--buy)' : 'var(--sell)';

    return `
      <div class="index-card" data-sym="${sym}">
        ${swipeActions}
        <div class="card-inner" onclick="handleCardTap('${sym}')">
          <div class="card-main">
            <div class="card-info">
              <div class="card-name">${idx.name}</div>
              <div class="card-symbol">${idx.symbol}</div>
            </div>
            <div class="card-right">
              <span class="signal-badge ${r.cls}">${r.signal}</span>
              <span class="card-pct ${pctCls}">${sign}${r.pct.toFixed(2)}%</span>
            </div>
            <div class="notif-bell" id="bell-${sym}">${bellIcon(15, notifEnabled[sym])}</div>
            ${chev}
          </div>
          <div class="card-detail" id="detail-${sym}">
            <div class="detail-inner">
              <div class="detail-row">
                <span class="detail-label">Current Price</span>
                <span class="detail-value">${fmt(r.price)}</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">200-Day SMA</span>
                <span class="detail-value">${fmt(r.sma)}</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">Difference from SMA</span>
                <span class="detail-value" style="color:${distCol}">${sign}${fmt(r.price - r.sma)} (${sign}${r.pct.toFixed(2)}%)</span>
              </div>
            </div>
            <div class="detail-actions">
              <button class="detail-action-btn" id="notif-detail-btn-${sym}" onclick="toggleNotif('${sym}', event)">
                ${bellIcon(14, notifEnabled[sym])}
                <span>${notifEnabled[sym] ? 'Notify On' : 'Notify Off'}</span>
              </button>
              <button class="detail-action-btn detail-action-remove" onclick="deleteIndex('${sym}', event)">
                ${TRASH}
                <span>Remove</span>
              </button>
            </div>
          </div>
        </div>
      </div>`;
  }

  function renderCards() {
    const el = document.getElementById('cardsContainer');
    el.innerHTML = tracked.length
      ? tracked.map(cardHTML).join('')
      : '<div class="empty-state">No indexes tracked.<br>Tap + to add one.</div>';
    tracked.forEach(attachSwipe);
    applyFilter();
    updateFilterBar();
  }

  function updateCard(sym) {
    const existing = document.querySelector(`.index-card[data-sym="${sym}"]`);
    if (!existing) { renderCards(); return; }
    const tmp     = document.createElement('div');
    tmp.innerHTML = cardHTML(sym).trim();
    existing.replaceWith(tmp.firstElementChild);
    attachSwipe(sym);
    applyFilter();
    updateFilterBar();
  }

  function handleCardTap(sym) {
    if (activeSwipe === sym) { closeSwipe(sym); return; }
    toggleDetail(sym);
  }

  function toggleDetail(sym) {
    document.getElementById('detail-' + sym)?.classList.toggle('open');
    document.getElementById('chev-'   + sym)?.classList.toggle('open');
  }

  // ── Fetch ─────────────────────────────────────────────────────
  async function fetchBarchartData(symbol) {
    const isMock = !window.Android &&
      (location.protocol === 'file:' || location.hostname === 'localhost' ||
       location.hostname.endsWith('github.io'));
    if (isMock) {
      const m = MOCK[symbol];
      await new Promise(r => setTimeout(r, 400 + Math.random() * 400));
      if (m) return m;
      throw new Error('No mock data');
    }
    if (window.Android && typeof window.Android.getHistoricalData === 'function') {
      try {
        const raw = window.Android.getHistoricalData(symbol);
        if (raw?.trim()) {
          const d = JSON.parse(raw);
          if (d.currentPrice && d.sma200) return d;
        }
      } catch (_) {}
    }
    const res = await fetch(
      `https://www.barchart.com/stocks/quotes/${symbol}/technical-analysis`,
      { headers: { 'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8' } }
    );
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const html = await res.text();
    let p = 0, s = 0;
    const pm = html.match(/"lastPrice"\s*:\s*"?([0-9,]+\.?[0-9]*)"?/);
    if (pm) p = parseFloat(pm[1].replace(/,/g, ''));
    const sm = html.match(/<td>200-Day<\/td>\s*<td[^>]*>\s*([\d,]+\.?\d*)\s*<\/td>/);
    if (sm) s = parseFloat(sm[1].replace(/,/g, ''));
    if (!p || !s) throw new Error('Could not parse data');
    return { currentPrice: p, sma200: s };
  }

  async function fetchOne(sym) {
    results[sym] = { state: 'loading' };
    updateCard(sym);
    try {
      const d    = await fetchBarchartData(sym);
      const buyT = parseFloat(document.getElementById('buyThreshold').value)  || 4;
      const selT = parseFloat(document.getElementById('sellThreshold').value) || 3;
      results[sym] = { state: 'done', price: d.currentPrice, sma: d.sma200,
                       ...determineSignal(d.currentPrice, d.sma200, buyT, selT) };
    } catch (e) {
      results[sym] = { state: 'error', msg: e.message };
    }
    updateCard(sym);
  }

  async function fetchAll() {
    const btn       = document.getElementById('refreshBtn');
    btn.disabled    = true;
    btn.textContent = 'Refreshing…';
    tracked.forEach(s => { results[s] = { state: 'loading' }; });
    renderCards();
    await Promise.all(tracked.map(fetchOne));
    const time = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    document.getElementById('lastUpdated').textContent = `Updated ${time}`;
    btn.disabled    = false;
    btn.textContent = 'Refresh All';
  }

  function retryOne(sym) { fetchOne(sym); }

  function fmt(n) {
    return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  // ── First-time swipe hint ──────────────────────────────────────
  function hintSwipe() {
    if (localStorage.getItem('swipeHintShown')) return;
    localStorage.setItem('swipeHintShown', '1');
    const sym = tracked[0];
    if (!sym) return;
    setTimeout(() => {
      const inner = document.querySelector(`.index-card[data-sym="${sym}"] .card-inner`);
      if (!inner) return;
      inner.style.transition = 'transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
      inner.style.transform  = 'translateX(-80px)';
      setTimeout(() => {
        inner.style.transition = 'transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1)';
        inner.style.transform  = 'translateX(0)';
      }, 900);
    }, 800);
  }

  // Prevent pinch-zoom on iOS Safari (viewport meta covers Android/others)
  document.addEventListener('touchmove', e => {
    if (e.touches.length > 1) e.preventDefault();
  }, { passive: false });

  // ── Sheet drag-to-dismiss ──────────────────────────────────────
  function attachSheetDrag(sheet, closeFn) {
    let startY = 0, currentDelta = 0, dragging = false;

    sheet.addEventListener('touchstart', e => {
      startY       = e.touches[0].clientY;
      currentDelta = 0;
      dragging     = false;
    }, { passive: true });

    sheet.addEventListener('touchmove', e => {
      const delta = e.touches[0].clientY - startY;
      if (!dragging) {
        // Only start drag when swiping down from top of sheet
        if (delta > 8 && sheet.scrollTop <= 0) {
          dragging = true;
          sheet.style.transition = 'none';
        } else {
          return;
        }
      }
      currentDelta = Math.max(0, delta);
      sheet.style.transform = `translateY(${currentDelta}px)`;
      e.preventDefault(); // stop page behind from scrolling
    }, { passive: false });

    sheet.addEventListener('touchend', () => {
      if (!dragging) return;
      dragging = false;
      if (currentDelta > 80) {
        sheet.style.transition = '';
        sheet.style.transform  = '';
        closeFn();
      } else {
        sheet.style.transition = 'transform 0.3s cubic-bezier(0.32, 0.72, 0, 1)';
        sheet.style.transform  = '';
        setTimeout(() => { sheet.style.transition = ''; }, 300);
      }
      currentDelta = 0;
    }, { passive: true });
  }

  // ── Init ──────────────────────────────────────────────────────
  window.onload = function () {
    loadSettings();
    renderCards();
    attachSheetDrag(document.getElementById('settingsSheet'), closeSettings);
    attachSheetDrag(document.getElementById('addSheet'),      closeAddIndex);

    const isBrowser = !window.Android &&
      (location.protocol === 'file:' || location.hostname === 'localhost' ||
       location.hostname.endsWith('github.io'));

    setTimeout(() => {
      if (isBrowser) {
        const buyT = parseFloat(document.getElementById('buyThreshold').value) || 4;
        const selT = parseFloat(document.getElementById('sellThreshold').value) || 3;
        tracked.forEach(sym => {
          const m = MOCK[sym];
          results[sym] = m
            ? { state: 'done', price: m.currentPrice, sma: m.sma200,
                ...determineSignal(m.currentPrice, m.sma200, buyT, selT) }
            : { state: 'error', msg: 'No mock data' };
        });
        renderCards();
        hintSwipe();
        const time = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
        document.getElementById('lastUpdated').textContent = `Updated ${time}`;
      } else {
        fetchAll();
      }
    }, 500);
  };
</script>
</body>
</html>
